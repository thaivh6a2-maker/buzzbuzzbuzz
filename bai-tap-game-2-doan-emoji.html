<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài 2 - Chọn Hộp Quà</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #dff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      width: 380px;
      padding: 24px;
      background: white;
      border: 3px solid #222;
      border-radius: 8px;
      box-shadow: 8px 8px 0 #222;
    }

    h1 {
      margin-top: 0;
    }

    .gifts {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 24px 0;
    }

    .gift {
      width: 80px;
      height: 80px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #fffc38;
      font-size: 42px;
      cursor: pointer;
    }

    .gift:hover {
      background: #fbf95e;
    }

    #result {
      min-height: 32px;
      font-size: 20px;
      font-weight: bold;
    }

    #open{
      margin-top: 0;
      font-weight: bold;
    }

    #again {
      display: none;
      padding: 12px 18px;
      border: 2px solid #222;
      border-radius: 8px;
      background: #8de969;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1 id="open">Chọn Hộp Quà</h1>
    <p>Chọn 1 hộp để xem bên trong có gì.</p>

    <div class="gifts">
      <button class="gift" onclick="openGift(1)">🎁</button>
      <button class="gift" onclick="openGift(2)">🎁</button>
      <button class="gift" onclick="openGift(3)">🎁</button>
      <button class="gift" onclick="openGift(4)">🎁</button>
    </div>

    <p id="result">Bạn chưa chọn hộp nào.</p>
    <button id="again" onclick="resetGame()">Chơi lại</button>
  </div>

  <script>
    function openGift(number) {
      if (number === 1) {
        document.getElementById("result").textContent = "Bạn nhận được 1$";
      }

      if (number === 2) {
        document.getElementById("result").textContent = "Bạn nhận được 100$";
      }

      if (number === 3) {
        document.getElementById("result").textContent = "Bạn nhận được 10$";
      }

      if (number === 4){
        document.getElementById("result").textContent = "Bạn nhận được 0$";
      }
      
      document.getElementById("open").textContent = "Mở quà rồi!"
      document.getElementById("again").style.display = "inline-block";
    }

    function resetGame() {
      document.getElementById("open").textContent = "Chọn Hộp Quà"
      document.getElementById("result").textContent = "Bạn chưa chọn hộp nào.";
      document.getElementById("again").style.display = "none";
    }

    /*
      Bài tập cho học viên:
      1. Đổi phần quà trong mỗi hộp.
      2. Đổi màu các hộp quà bằng CSS.
      3. Khi chọn hộp, đổi tiêu đề h1 thành "Mở quà rồi!".
      4. Thêm hộp quà thứ 4.
    */
  </script>
</body>
</html>
